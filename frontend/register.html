<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Learnova</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

  <!-- Premium Loader Screen -->
  <div id="loader-screen">
    <div class="loader-logo">
      <svg viewBox="0 0 44 24" width="56" height="32" fill="none">
        <circle cx="14" cy="12" r="8" stroke="#8b5cf6" stroke-width="3" />
        <circle cx="27" cy="12" r="8" stroke="#94a3b8" stroke-width="3" stroke-opacity="0.8" />
      </svg>
      <span>Learnova</span>
    </div>
    <div class="loader-ring"></div>
  </div>

  <div class="glowing-blob blob-purple"></div>
  <div class="glowing-blob blob-cyan"></div>

  <div class="auth-wrapper">
    <div class="auth-card-container">

      <a href="index.html" class="back-home-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Home
      </a>

      <!-- Registration Card -->
      <div class="auth-card glass active" id="register-card">
        <div class="auth-header">
          <h2>Create Account</h2>
          <p>Join the premier skill exchange platform</p>
        </div>

        <form id="register-form">
          <div class="form-group-floating">
            <input type="text" id="reg-name" required placeholder=" " autocomplete="name">
            <label for="reg-name">Full Name</label>
            <div class="input-glow"></div>
          </div>

          <div class="form-group-floating">
            <input type="email" id="reg-email" required placeholder=" " autocomplete="email">
            <label for="reg-email">Email Address</label>
            <div class="input-glow"></div>
          </div>

          <div class="form-group-floating">
            <input type="password" id="reg-password" required placeholder=" " autocomplete="new-password">
            <label for="reg-password">Password</label>
            <div class="input-glow"></div>
          </div>

          <!-- Password Strength Meter -->
          <div class="strength-meter-wrapper">
            <span class="strength-label">Password Strength: <strong id="strength-text">Empty</strong></span>
            <div class="strength-bar-bg">
              <div class="strength-bar" id="strength-bar"></div>
            </div>
            <ul class="strength-hints">
              <li id="hint-len">At least 8 characters</li>
              <li id="hint-num">At least one number</li>
              <li id="hint-spec">At least one special char</li>
            </ul>
          </div>

          <!-- Terms & Privacy Agreement Checkbox -->
          <div class="form-group-checkbox"
            style="margin: 18px 0 12px; display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text-secondary); text-align: left;">
            <input type="checkbox" id="reg-terms" required style="margin-top: 3px; cursor: pointer;">
            <label for="reg-terms" style="cursor: pointer; line-height: 1.4;">I agree to the <a href="terms.html"
                target="_blank" style="color: var(--purple); text-decoration: underline; font-weight: 600;">Terms &
                Conditions</a> and <a href="privacy.html" target="_blank"
                style="color: var(--purple); text-decoration: underline; font-weight: 600;">Privacy Policy</a></label>
          </div>

          <button type="submit" class="btn btn-primary btn-glow btn-block">Sign Up</button>
        </form>

        <div class="auth-divider">
          <span>Or sign up with</span>
        </div>

        <div class="social-login-grid">
          <button class="btn btn-secondary btn-social" aria-label="Sign up with Google">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M22.56 12.23c0-.82-.07-1.63-.2-2.43H12v4.6h5.93c-.26 1.55-1.16 2.87-2.48 3.75v3.13h4.02c2.35-2.17 3.7-5.37 3.7-8.98z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-4.02-3.13c-.98.66-2.23 1.05-3.26 1.05-2.5 0-4.63-1.69-5.38-3.96H2.43v3.18C4.26 21.2 7.84 23 12 23z" fill="#34A853"/>
              <path d="M6.62 14.3A6.38 6.38 0 016.3 12c0-.79.13-1.55.33-2.3v-3.18H2.43A10.98 10.98 0 001.12 12c0 1.77.42 3.45 1.16 4.96l4.34-2.66z" fill="#FBBC05"/>
              <path d="M12 4.93c1.62 0 3.07.56 4.22 1.65l3.17-3.17C17.45 1.43 14.96.45 12 .45 7.84.45 4.26 2.2 2.43 5.5l4.19 3.18c.75-2.27 2.88-3.75 5.38-3.75z" fill="#EA4335" />
            </svg>
          </button>
          <button class="btn btn-secondary btn-social" aria-label="Sign up with GitHub">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
              <path fill-rule="evenodd"
                d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"
                clip-rule="evenodd" />
            </svg>
          </button>
        </div>

        <p class="auth-switch">Already have an account? <a href="login.html">Sign In</a></p>
      </div>

    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
