<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Learnova</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Premium Loader Screen -->
  <div id="loader-screen">
    <div class="loader-logo">
      <svg viewBox="0 0 44 24" width="56" height="32" fill="none">
        <circle cx="14" cy="12" r="8" stroke="#8b5cf6" stroke-width="3" />
        <circle cx="27" cy="12" r="8" stroke="#94a3b8" stroke-width="3" stroke-opacity="0.8" />
      </svg>
      <span>Learnova</span>
    </div>
    <div class="loader-ring"></div>
  </div>

  <div class="glowing-blob blob-purple"></div>
  <div class="glowing-blob blob-cyan"></div>

  <div class="auth-wrapper">
    <div class="auth-card-container">
      
      <a href="login.html" class="back-home-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to Login
      </a>
      
      <!-- OTP Verification Card -->
      <div class="auth-card glass active" id="verify-card">
        <div class="auth-header">
          <h2>Verify Your Email</h2>
          <p>Please enter the 6-digit verification code sent to:</p>
          <div class="verify-email-badge" id="user-email-display">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <span id="email-text">Loading email...</span>
          </div>
        </div>
        
        <form id="verify-otp-form">
          <div class="otp-input-grid" id="otp-grid">
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" autofocus required />
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" required />
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" required />
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" required />
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" required />
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]*" required />
          </div>
          
          <button type="submit" class="btn btn-primary btn-glow btn-block" id="verify-submit-btn">Verify Email</button>
        </form>
        
        <div class="resend-wrapper">
          <span>Didn't receive the code?</span>
          <button type="button" id="resend-btn" class="btn-text-resend" disabled>Resend OTP</button>
          <span id="countdown-timer">01:00</span>
        </div>
        
        <p class="auth-switch">Entered the wrong email? <a href="register.html">Sign Up Again</a></p>
      </div>
      
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/verify-email.js"></script>
</body>
</html>
