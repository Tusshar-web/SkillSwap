<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LearnLoop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                Learn<span>Loop</span>
            </a>
            <nav class="nav-menu">
                <a href="explore.html">Explore</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="requests.html">Requests</a>
                <a href="chat.html">Messages</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-secondary">Login</a>
                <a href="register.html" class="btn btn-primary">Join Free</a>
            </div>
        </div>
    </header>

    <main class="auth-section">
        <div class="auth-container">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Log in to continue your learning loop</p>

            <form class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Log In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 LearnLoop Platform. Built for community learning.</p>
    </footer>

    <!-- LINKED AUTH JS FILE -->
    <script src="js/auth.js"></script>
</body>
</html>
