<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - LearnLoop</title>
    
    <!-- Verified Path Links -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon"></span>
                <span>Learn<span>Loop</span></span>
            </a>
            <nav class="nav-menu">
                <a href="explore.html">Explore</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="requests.html">Requests</a>
                <a href="chat.html">Messages</a>
            </nav>
            <div class="nav-actions">
                <span class="dashboard-avatar">JL</span>
            </div>
        </div>
    </header>

    <main class="profile-view">
        <div class="profile-container">
            
            <section class="profile-card">
                <h2>User Profile Management</h2>
                <form class="profile-form">
                    <div class="form-group">
                        <label for="bio">Short Bio</label>
                        <textarea id="bio" rows="4" placeholder="Tell the community about yourself, your background, and your learning goals..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Profile Info</button>
                </form>
            </section>

            <div class="skill-management-grid">
                
                <section class="skill-box">
                    <h3>Skills Offered (To Teach)</h3>
                    <form class="add-skill-form">
                        <input type="text" placeholder="e.g., Web Development" required>
                        <select required>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Expert">Expert</option>
                        </select>
                        <button type="submit" class="btn btn-primary">Add</button>
                    </form>
                    
                    <ul class="managed-skills-list">
                        <li>
                            <span>UI/UX Design — <strong>Expert</strong></span>
                            <button class="remove-skill-btn">&times;</button>
                        </li>
                        <li>
                            <span>Figma — <strong>Expert</strong></span>
                            <button class="remove-skill-btn">&times;</button>
                        </li>
                    </ul>
                </section>

                <section class="skill-box">
                    <h3>Skills Wanted (To Learn)</h3>
                    <form class="add-skill-form">
                        <input type="text" placeholder="e.g., French Language" required>
                        <select required>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Expert">Expert</option>
                        </select>
                        <button type="submit" class="btn btn-primary">Add</button>
                    </form>
                    
                    <ul class="managed-skills-list">
                        <li>
                            <span>Python — <strong>Beginner</strong></span>
                            <button class="remove-skill-btn">&times;</button>
                        </li>
                    </ul>
                </section>

            </div>

        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 LearnLoop Platform. Built for community learning.</p>
    </footer>

    <script src="js/profile.js"></script>
</body>
</html>
